<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ល្បែងសត្វប្រណាំង - អ្នកចាញ់ឆ្លើយសំណួរ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap');

        body {
            font-family: 'Battambang', cursive, sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #006064;
            text-shadow: 2px 2px #b2ebf2;
        }

        .setup-container {
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }

        textarea {
            width: 300px;
            height: 100px;
            font-family: 'Battambang', sans-serif;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #00acc1;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button {
            background-color: #ff5252;
            color: white;
            font-family: 'Battambang', sans-serif;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        button:hover {
            background-color: #ff1744;
            transform: scale(1.05);
        }

        .track-container {
            background-color: #81c784;
            border-radius: 10px;
            padding: 10px 0;
            position: relative;
            overflow: hidden;
            border: 4px solid #388e3c;
            min-height: 200px;
            display: none; /* Hidden until race starts */
        }

        .finish-line {
            position: absolute;
            right: 10%;
            top: 0;
            bottom: 0;
            width: 20px;
            background-image: repeating-linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), repeating-linear-gradient(45deg, #000 25%, #fff 25%, #fff 75%, #000 75%, #000);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            border-left: 3px solid red;
            z-index: 1;
        }

        .lane {
            position: relative;
            height: 60px;
            border-bottom: 2px dashed #c8e6c9;
            display: flex;
            align-items: center;
        }

        .racer {
            position: absolute;
            left: 0;
            font-size: 40px;
            display: flex;
            align-items: center;
            z-index: 2;
            transition: left 0.1s linear;
        }

        .name-tag {
            font-size: 16px;
            background: white;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
            font-weight: bold;
            border: 2px solid #333;
            white-space: nowrap;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid #ff5252;
        }

        .modal-content h2 {
            font-size: 30px;
            color: #d32f2f;
            margin-bottom: 10px;
        }

        .loser-name {
            font-size: 50px;
            color: #1976d2;
            font-weight: bold;
            margin: 20px 0;
            text-decoration: underline;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <h1>🐾 ល្បែងសត្វប្រណាំង - ហៅឈ្មោះសិស្ស 🐾</h1>

    <div class="setup-container" id="setupBox">
        <p>សូមបញ្ចូលឈ្មោះសិស្ស (សរសេរមួយជួរមួយឈ្មោះ):</p>
        <textarea id="studentNames" placeholder="ឧទាហរណ៍៖&#10;សុខ&#10;សៅ&#10;លីណា&#10;ចន្ថា"></textarea><br>
        <button onclick="prepareRace()">🏁 ចាប់ផ្តើមប្រណាំង</button>
    </div>

    <div class="track-container" id="track">
        <div class="finish-line"></div>
        <div id="lanes"></div>
    </div>

    <!-- Modal សម្រាប់បង្ហាញអ្នកចាញ់ -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2>អ្នកដែលរត់ដល់ទីក្រោយគេគឺ៖</h2>
            <div class="loser-name" id="loserNameDisplay">ឈ្មោះសិស្ស</div>
            <h2>⚠️ សូមងើបឈរឡើង ដើម្បីឆ្លើយសំណួរលោកគ្រូ/អ្នកគ្រូ! ⚠️</h2>
            <button onclick="resetGame()" style="margin-top: 20px; background-color: #4caf50;">លេងម្តងទៀត 🔄</button>
        </div>
    </div>

    <script>
        const animals = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐯', '🦁', '🐷', '🐸', '🐵', '🐔', '🐧'];
        let racers = [];
        let raceInterval;
        let finishedCount = 0;
        let isRacing = false;

        function prepareRace() {
            const nameInput = document.getElementById('studentNames').value.trim();
            const names = nameInput.split('\n').map(name => name.trim()).filter(name => name !== '');

            if (names.length < 2) {
                alert("សូមបញ្ចូលឈ្មោះសិស្សយ៉ាងតិច ២នាក់!");
                return;
            }

            // Shuffle animals randomly
            const shuffledAnimals = animals.sort(() => 0.5 - Math.random());
            
            const lanesDiv = document.getElementById('lanes');
            lanesDiv.innerHTML = '';
            racers = [];
            finishedCount = 0;

            names.forEach((name, index) => {
                const lane = document.createElement('div');
                lane.className = 'lane';
                
                const racerEle = document.createElement('div');
                racerEle.className = 'racer';
                
                // Assign animal and name tag
                const animalEmoji = shuffledAnimals[index % shuffledAnimals.length];
                racerEle.innerHTML = `${animalEmoji} <span class="name-tag">${name}</span>`;
                
                lane.appendChild(racerEle);
                lanesDiv.appendChild(lane);

                racers.push({
                    name: name,
                    element: racerEle,
                    position: 0,
                    finished: false
                });
            });

            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('track').style.display = 'block';
            
            // Start the race after 1 second
            setTimeout(startRace, 1000);
        }

        function startRace() {
            isRacing = true;
            // រត់រាល់ 50 មីលីវិនាទី
            raceInterval = setInterval(updateRace, 50);
        }

        function updateRace() {
            let allFinished = true;

            racers.forEach(racer => {
                if (!racer.finished) {
                    allFinished = false;
                    // ល្បឿនចៃដន្យ (Random Speed)
                    let speed = Math.random() * 1.5 + 0.2; 
                    racer.position += speed;
                    racer.element.style.left = racer.position + '%';

                    // បើមកដល់បន្ទាត់ទី (៩០%)
                    if (racer.position >= 82) {
                        racer.finished = true;
                        racer.element.style.left = '82%';
                        finishedCount++;

                        // ឆែកមើលថាតើជាអ្នកមកដល់ទីក្រោយគេឬទេ
                        if (finishedCount === racers.length) {
                            endGame(racer.name);
                        }
                    }
                }
            });

            if (allFinished) {
                clearInterval(raceInterval);
            }
        }

        function endGame(loserName) {
            isRacing = false;
            clearInterval(raceInterval);
            
            setTimeout(() => {
                document.getElementById('loserNameDisplay').innerText = loserName;
                document.getElementById('resultModal').style.display = 'flex';
            }, 500); // រង់ចាំកន្លះវិនាទី ទើបលោតផ្ទាំង
        }

        function resetGame() {
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('track').style.display = 'none';
            document.getElementById('setupBox').style.display = 'inline-block';
        }
    </script>
</body>
</html>
